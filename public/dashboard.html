<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS - Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: white; min-height: 100vh; }
  .navbar { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
  .navbar h1 { color: #e94560; font-size: 20px; }
  .nav-right { display: flex; align-items: center; gap: 15px; }
  .avatar { width: 38px; height: 38px; background: linear-gradient(135deg, #e94560, #c23152); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
  .btn-logout { background: rgba(233,69,96,0.2); border: 1px solid #e94560; color: #e94560; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
  .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; text-align: center; }
  .stat-card .val { font-size: 28px; font-weight: bold; color: #e94560; }
  .stat-card .lbl { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 5px; text-transform: uppercase; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; }
  .panel h3 { margin-bottom: 20px; color: rgba(255,255,255,0.9); font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
  .edit-btn { background: rgba(233,69,96,0.2); border: 1px solid #e94560; color: #e94560; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-row span:first-child { color: rgba(255,255,255,0.5); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { color: rgba(255,255,255,0.5); text-align: left; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 11px; text-transform: uppercase; }
  td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.present { background: rgba(46,213,115,0.2); color: #2ed573; }
  .badge.absent { background: rgba(233,69,96,0.2); color: #e94560; }
  .badge.late { background: rgba(255,165,0,0.2); color: orange; }
  .progress-bar { background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b9d); border-radius: 10px; transition: width 0.5s; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 30px; width: 450px; max-height: 80vh; overflow-y: auto; }
  .modal h3 { margin-bottom: 20px; color: white; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; color: rgba(255,255,255,0.6); font-size: 12px; margin-bottom: 5px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: white; font-size: 14px; outline: none; }
  .form-group textarea { resize: none; height: 60px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save { flex: 1; padding: 11px; background: linear-gradient(135deg, #e94560, #c23152); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; }
  .btn-cancel { flex: 1; padding: 11px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: white; cursor: pointer; }
  .empty { text-align: center; color: rgba(255,255,255,0.3); padding: 30px; font-size: 14px; }
  @media(max-width:768px) { .stats-grid { grid-template-columns: 1fr 1fr; } .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="navbar">
  <h1>📚 SMS Dashboard</h1>
  <div class="nav-right">
    <div class="avatar" id="avatarLetter">S</div>
    <span id="navName" style="font-size:14px;color:rgba(255,255,255,0.7)"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="stats-grid">
    <div class="stat-card"><div class="val" id="statCgpa">-</div><div class="lbl">CGPA</div></div>
    <div class="stat-card"><div class="val" id="statAttend">-</div><div class="lbl">Attendance %</div></div>
    <div class="stat-card"><div class="val" id="statSubjects">-</div><div class="lbl">Subjects</div></div>
    <div class="stat-card"><div class="val" id="statSemester">-</div><div class="lbl">Latest Semester</div></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h3>My Profile <button class="edit-btn" onclick="openEdit()">✏️ Edit</button></h3>
      <div id="profileInfo"></div>
    </div>
    <div class="panel">
      <h3>Grades</h3>
      <div id="gradesContent"></div>
    </div>
  </div>

  <div class="panel">
    <h3>Attendance Record</h3>
    <div id="attendanceContent"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ Edit Profile</h3>
    <div class="form-group"><label>Full Name</label><input id="eFull"></div>
    <div class="form-group"><label>Email</label><input id="eEmail" type="email"></div>
    <div class="form-group"><label>Mobile</label><input id="eMobile"></div>
    <div class="form-group"><label>Address</label><textarea id="eAddress"></textarea></div>
    <div class="form-group"><label>New Password (leave blank to keep)</label><input id="ePass" type="password" placeholder="New password"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) location.href = 'index.html';

let profile = {};

async function loadProfile() {
  const res = await fetch('/profile', { headers: { Authorization: 'Bearer ' + token } });
  if (!res.ok) return logout();
  profile = await res.json();
  renderProfile();
}

function renderProfile() {
  document.getElementById('navName').textContent = profile.fullName;
  document.getElementById('avatarLetter').textContent = profile.fullName[0].toUpperCase();

  const attend = profile.attendance || [];
  const present = attend.filter(a => a.status === 'Present').length;
  const attendPct = attend.length ? Math.round((present / attend.length) * 100) : 0;
  const grades = profile.grades || [];
  const semesters = [...new Set(grades.map(g => g.semester))];

  document.getElementById('statCgpa').textContent = profile.cgpa || '0.00';
  document.getElementById('statAttend').textContent = attendPct + '%';
  document.getElementById('statSubjects').textContent = [...new Set(grades.map(g => g.subject))].length;
  document.getElementById('statSemester').textContent = semesters.length ? semesters[semesters.length - 1] : '-';

  document.getElementById('profileInfo').innerHTML = [
    ['Full Name', profile.fullName], ['Username', profile.username],
    ['Email', profile.email], ['Course', profile.course],
    ['Mobile', profile.mobile], ['Gender', profile.gender],
    ['Date of Birth', profile.dob], ['Enrolled', profile.enrolledDate],
    ['Address', profile.address || '-']
  ].map(([k, v]) => `<div class="info-row"><span>${k}</span><span>${v}</span></div>`).join('');

  if (!grades.length) {
    document.getElementById('gradesContent').innerHTML = '<div class="empty">No grades recorded yet</div>';
  } else {
    document.getElementById('gradesContent').innerHTML = `
      <table><thead><tr><th>Subject</th><th>Sem</th><th>Marks</th><th>Progress</th></tr></thead>
      <tbody>${grades.map(g => {
        const pct = Math.round((g.marks / g.maxMarks) * 100);
        return `<tr><td>${g.subject}</td><td>${g.semester}</td><td>${g.marks}/${g.maxMarks}</td>
        <td><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></td></tr>`;
      }).join('')}</tbody></table>`;
  }

  if (!attend.length) {
    document.getElementById('attendanceContent').innerHTML = '<div class="empty">No attendance records yet</div>';
  } else {
    document.getElementById('attendanceContent').innerHTML = `
      <table><thead><tr><th>Date</th><th>Subject</th><th>Status</th></tr></thead>
      <tbody>${attend.slice().reverse().map(a =>
        `<tr><td>${a.date}</td><td>${a.subject}</td><td><span class="badge ${a.status.toLowerCase()}">${a.status}</span></td></tr>`
      ).join('')}</tbody></table>`;
  }
}

function openEdit() {
  document.getElementById('eFull').value = profile.fullName;
  document.getElementById('eEmail').value = profile.email;
  document.getElementById('eMobile').value = profile.mobile;
  document.getElementById('eAddress').value = profile.address || '';
  document.getElementById('ePass').value = '';
  document.getElementById('editModal').classList.add('show');
}
function closeEdit() { document.getElementById('editModal').classList.remove('show'); }

async function saveProfile() {
  const body = {
    fullName: document.getElementById('eFull').value.trim(),
    email: document.getElementById('eEmail').value.trim(),
    mobile: document.getElementById('eMobile').value.trim(),
    address: document.getElementById('eAddress').value.trim()
  };
  const pass = document.getElementById('ePass').value;
  if (pass) body.password = pass;

  const res = await fetch('/profile', {
    method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify(body)
  });
  if (res.ok) { closeEdit(); loadProfile(); }
}

function logout() { localStorage.clear(); location.href = 'index.html'; }

loadProfile();
</script>
</body>
</html>
